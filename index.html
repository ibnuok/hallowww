<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise</title>

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #ff4d6d;
            --secondary-color: #ff8fa3;
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-color: #590d22;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-color);
        }

        /* BACKGROUND */
        .bg-shapes {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            animation: float 20s infinite linear;
        }

        .shape:nth-child(1) { width:150px;height:150px;top:10%;left:10%; }
        .shape:nth-child(2) { width:200px;height:200px;bottom:20%;right:10%; }
        .shape:nth-child(3) { width:100px;height:100px;top:40%;left:50%; }

        @keyframes float {
            0% {transform: translate(0,0);}
            50% {transform: translate(20px,40px);}
            100% {transform: translate(0,0);}
        }

        /* GAME */
        #game-stage {
            z-index: 10;
            text-align: center;
        }

        .instructions {
            background: var(--glass-bg);
            padding: 2rem;
            border-radius: 20px;
            margin-bottom: 2rem;
        }

        .instructions h1 {
            font-family: 'Dancing Script';
            font-size: 2.5rem;
        }

        .score-board {
            margin-top: 10px;
            font-weight: bold;
            color: var(--primary-color);
        }

        .hiding-spots-container {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
        }

        .hiding-spot {
            font-size: 3rem;
            cursor: pointer;
        }

        /* ENVELOPE */
        #envelope-stage {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .envelope {
            width: 250px;
            height: 150px;
            background: var(--primary-color);
            border-radius: 10px;
            position: relative;
        }

        .open-btn {
            margin-top: 2rem;
            padding: 10px 30px;
            border: none;
            border-radius: 30px;
            background: white;
            color: var(--primary-color);
            font-weight: bold;
            cursor: pointer;
        }

        /* LETTER VIEW */
        #letter-view {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #letter-view.active {
            display: flex;
        }

        /* 🔥 FIX UTAMA DI SINI */
        .love-letter {
            background: white;
            width: 100%;
            max-width: 600px;

            max-height: 80vh;
            overflow-y: auto;

            padding: 2rem;
            border-radius: 10px;
            line-height: 1.6;
        }

        .love-letter h2 {
            text-align: center;
            font-family: 'Dancing Script';
            color: var(--primary-color);
        }

        .love-letter p {
            margin-top: 1rem;
            font-family: 'Dancing Script';
            font-size: 1.4rem;
        }

        .close-btn {
            position: absolute;
            right: 20px;
            top: 10px;
            font-size: 20px;
            cursor: pointer;
        }

        /* RESPONSIVE */
        @media (max-width:480px){
            .love-letter {
                padding: 1.5rem;
                max-height: 75vh;
            }

            .love-letter p {
                font-size: 1.2rem;
            }
        }
    </style>
</head>

<body>

<div class="bg-shapes">
    <div class="shape"></div>
    <div class="shape"></div>
    <div class="shape"></div>
</div>

<!-- GAME -->
<div id="game-stage">
    <div class="instructions">
        <h1>Find My Heart</h1>
        <p>Click 3 hearts ❤️</p>
        <div class="score-board">Found: <span id="counter">0</span>/3</div>
    </div>

    <div class="hiding-spots-container" id="spots"></div>
</div>

<!-- ENVELOPE -->
<div id="envelope-stage">
    <div class="envelope"></div>
    <button class="open-btn" onclick="openLetter()">Open Me</button>
</div>

<!-- LETTER -->
<div id="letter-view">
    <div class="love-letter">
        <span class="close-btn" onclick="closeLetter()">×</span>

        <h2>My Dearest ❤️</h2>

        <p>halloo sayanggg, akuu cumaa mauu ucapinn buatt kamuu yang hebat bgtt...</p>
        <p>ingett gagal bukan akhirr dari segalanya...</p>
        <p>semogaa hasill yang kamu dapatkan sesuaii impian kamuu yaa...</p>
        <p>I Love You More ❤️</p>

    </div>
</div>

<script>
let count = 0;

function init(){
    const container = document.getElementById("spots");

    for(let i=0;i<12;i++){
        let el = document.createElement("div");
        el.className="hiding-spot";
        el.innerText="🎁";

        el.onclick = ()=>{
            if(el.clicked) return;

            el.clicked=true;

            if(count<3){
                el.innerText="❤️";
                count++;
                document.getElementById("counter").innerText=count;

                if(count===3){
                    document.getElementById("game-stage").style.display="none";
                    document.getElementById("envelope-stage").style.display="flex";
                }
            }else{
                el.innerText="❌";
            }
        }

        container.appendChild(el);
    }
}

function openLetter(){
    document.getElementById("letter-view").classList.add("active");
}

function closeLetter(){
    document.getElementById("letter-view").classList.remove("active");
}

init();
</script>

</body>
</html>
